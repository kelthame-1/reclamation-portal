<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:fragment="page(title, content)">
<head>
    <meta charset="UTF-8">
    <th:block th:replace="${title}"></th:block>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        .sidebar {
            min-height: 100vh;
            background-color: #ffffff;
            border-right: 1px solid #e9ecef;
        }
        .sidebar a {
            color: #495057;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            border-radius: 8px;
            margin-bottom: 4px;
        }
        .sidebar a:hover {
            background-color: #f1f3f5;
        }
        .sidebar a.active {
            background-color: #e7f1ff;
            color: #2563eb;
            font-weight: 600;
        }
        .sidebar i {
            font-size: 1.1rem;
        }
    </style>

</head>
<body style="background-color:#f4f6f9;">

<nav class="navbar bg-white border-bottom px-3 shadow-sm">
    <span class="navbar-brand mb-0 h1 fw-bold text-primary">
        <i class="bi bi-headset me-2"></i>Portail Réclamations
    </span>
    <div class="dropdown">
        <button class="btn btn-light d-flex align-items-center gap-2 border" type="button" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle fs-5"></i>
            <span th:text="${currentUser != null ? currentUser.nom + ' (' + currentUser.role + ')' : ''}"></span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
            <li>
                <form th:action="@{/logout}" method="post" class="px-3 py-1">
                    <button type="submit" class="btn btn-sm btn-outline-danger w-100">
                        <i class="bi bi-box-arrow-right"></i> Déconnexion
                    </button>
                </form>
            </li>
        </ul>
    </div>
</nav>

<div class="d-flex">
    <div class="sidebar p-3" style="width: 220px;">
        <a th:href="@{/dashboard}" th:classappend="${currentPath == '/dashboard'} ? 'active'">
            <i class="bi bi-speedometer2"></i> Tableau de bord
        </a>
        <a th:href="@{/reclamations}" th:classappend="${currentPath != null and currentPath.startsWith('/reclamations')} ? 'active'">
            <i class="bi bi-card-list"></i> Réclamations
        </a>
        <a th:href="@{/categories}" th:classappend="${currentPath == '/categories'} ? 'active'">
            <i class="bi bi-tags"></i> Catégories
        </a>
        <a th:href="@{/utilisateurs}" th:classappend="${currentPath == '/utilisateurs'} ? 'active'">
            <i class="bi bi-people"></i> Utilisateurs
        </a>
    </div>

    <div class="flex-grow-1 p-4">
        <th:block th:replace="${content}"></th:block>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
