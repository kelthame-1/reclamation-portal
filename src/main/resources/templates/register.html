<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inscription</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card p-4 shadow" style="width: 400px;">
        <h3 class="text-center mb-3">Créer un compte</h3>

        <form th:action="@{/register}" th:object="${utilisateur}" method="post">
            <div class="mb-3">
                <label class="form-label">Nom complet</label>
                <input type="text" th:field="*{nom}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" th:field="*{email}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Mot de passe</label>
                <input type="password" th:field="*{motDePasse}" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success w-100">S'inscrire</button>
        </form>

        <p class="text-center mt-3">
            Déjà un compte ? <a th:href="@{/login}">Se connecter</a>
        </p>
    </div>
</div>
</body>
</html>
