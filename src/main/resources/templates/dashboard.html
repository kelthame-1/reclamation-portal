<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: page(~{::title}, ~{::content})}">
<title>Tableau de bord</title>

<th:block th:fragment="content">

    <h2 class="mb-4 fw-bold">Tableau de bord</h2>

    <div class="row mb-4 g-3">
        <div class="col-md-3">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="rounded-circle d-flex align-items-center justify-content-center"
                         style="width:48px;height:48px;background-color:#e7f1ff;">
                        <i class="bi bi-folder2-open text-primary fs-4"></i>
                    </div>
                    <div>
                        <div class="text-muted small">Ouvertes</div>
                        <div class="fs-3 fw-bold" th:text="${nbOuvertes}"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="rounded-circle d-flex align-items-center justify-content-center"
                         style="width:48px;height:48px;background-color:#fff4e0;">
                        <i class="bi bi-hourglass-split text-warning fs-4"></i>
                    </div>
                    <div>
                        <div class="text-muted small">En traitement</div>
                        <div class="fs-3 fw-bold" th:text="${nbEnTraitement}"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="rounded-circle d-flex align-items-center justify-content-center"
                         style="width:48px;height:48px;background-color:#e6f7ec;">
                        <i class="bi bi-check-circle text-success fs-4"></i>
                    </div>
                    <div>
                        <div class="text-muted small">Résolues</div>
                        <div class="fs-3 fw-bold" th:text="${nbResolues}"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="rounded-circle d-flex align-items-center justify-content-center"
                         style="width:48px;height:48px;background-color:#eceff1;">
                        <i class="bi bi-archive text-secondary fs-4"></i>
                    </div>
                    <div>
                        <div class="text-muted small">Fermées</div>
                        <div class="fs-3 fw-bold" th:text="${nbFermees}"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <h5 class="card-title mb-3">Réclamations récentes</h5>
            <table class="table table-hover align-middle mb-0">
                <thead>
                <tr class="text-muted small">
                    <th>ID</th>
                    <th>Titre</th>
                    <th>Statut</th>
                    <th>Catégorie</th>
                    <th>Date création</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="r : ${reclamations}">
                    <td th:text="${r.id}"></td>
                    <td th:text="${r.titre}"></td>
                    <td>
                            <span th:switch="${r.statut.name()}">
                                <span th:case="'OUVERTE'" class="badge rounded-pill bg-primary">Ouverte</span>
                                <span th:case="'EN_TRAITEMENT'" class="badge rounded-pill bg-warning text-dark">En traitement</span>
                                <span th:case="'RESOLUE'" class="badge rounded-pill bg-success">Résolue</span>
                                <span th:case="'FERMEE'" class="badge rounded-pill bg-secondary">Fermée</span>
                            </span>
                    </td>
                    <td th:text="${r.categorie != null ? r.categorie.nom : '-'}"></td>
                    <td th:text="${#temporals.format(r.dateCreation, 'dd/MM/yyyy HH:mm')}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</th:block>
</html>
