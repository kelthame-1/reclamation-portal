<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: page(~{::title}, ~{::content})}">
<title>Catégories</title>

<th:block th:fragment="content">

    <h2 class="mb-4 fw-bold">Catégories</h2>

    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <table class="table table-hover align-middle mb-0" style="max-width: 700px;">
                <thead>
                <tr class="text-muted small">
                    <th>ID</th>
                    <th>Nom</th>
                    <th>Description</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="cat : ${categories}">
                    <td th:text="${cat.id}"></td>
                    <td th:text="${cat.nom}"></td>
                    <td th:text="${cat.description}"></td>
                    <td>
                        <a th:href="@{/categories/supprimer/{id}(id=${cat.id})}" class="btn btn-sm btn-outline-danger">Supprimer</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card border-0 shadow-sm" style="max-width: 500px;">
        <div class="card-body">
            <h5 class="card-title mb-3">Ajouter une catégorie</h5>
            <form th:action="@{/categories}" th:object="${categorie}" method="post">
                <div class="mb-3">
                    <label class="form-label">Nom</label>
                    <input type="text" th:field="*{nom}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <input type="text" th:field="*{description}" class="form-control">
                </div>
                <button type="submit" class="btn btn-primary">Ajouter</button>
            </form>
        </div>
    </div>

</th:block>
</html>
